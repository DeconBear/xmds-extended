name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.os }} smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 toolchain on Windows
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-tools

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: xmds-ci
          auto-activate: true
          channels: conda-forge
          conda-remove-defaults: true
          python-version: "3.11"
          use-mamba: true

      - name: Install CI dependencies on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          mamba install -y \
            cheetah3 \
            "pyparsing!=2.0.0" \
            mpmath \
            numpy \
            lxml \
            h5py \
            hdf5 \
            fftw \
            setuptools
          python -V
          c++ --version
          which h5cc || true

      - name: Install CI dependencies on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          conda install -y -c conda-forge `
            cheetah3 `
            'pyparsing!=2.0.0' `
            mpmath `
            numpy `
            lxml `
            h5py `
            hdf5 `
            fftw `
            setuptools

      - name: Resolve CI prefix on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          PREFIX="$(python -c 'import sys; print(sys.prefix)' | tail -n 1)"
          echo "CI_PREFIX=$PREFIX" >> "$GITHUB_ENV"

      - name: Reconfigure on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          export XMDS_USER_DATA="$PWD/.xmds-ci-home"
          python bin/xmds2 --reconfigure \
            --include-path "$CI_PREFIX/include" \
            --lib-path "$CI_PREFIX/lib"

      - name: Compile lorenz on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          export XMDS_USER_DATA="$PWD/.xmds-ci-home"
          python bin/xmds2 examples/lorenz.xmds

      - name: Run lorenz on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${RUNNER_OS}" = "macOS" ]; then
            DYLD_LIBRARY_PATH="$CI_PREFIX/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}" ./lorenz
          else
            LD_LIBRARY_PATH="$CI_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" ./lorenz
          fi

      - name: Resolve CI prefix on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $prefix = (python -c "import sys; print(sys.prefix)").Trim()
          "CI_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CI_PYTHON=$(Join-Path $prefix 'python.exe')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $includePath = Join-Path $prefix 'Library\include'
          $libPath = Join-Path $prefix 'Library\lib'
          $extraPaths = @(
            'C:\msys64\mingw64\bin',
            'C:\msys64\usr\bin',
            (Join-Path $prefix 'Library\usr\bin'),
            (Join-Path $prefix 'Library\bin'),
            (Join-Path $prefix 'Scripts'),
            (Join-Path $prefix 'bin')
          ) | Where-Object { Test-Path $_ }
          if (-not $extraPaths) {
            throw "No expected compiler/runtime paths were found under $prefix"
          }
          foreach ($pathEntry in $extraPaths) {
            $pathEntry | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Check compiler on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          g++ --version

      - name: Prepare HDF5 import libraries on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $libDir = Join-Path $env:CI_PREFIX 'Library\lib'
          $binDir = Join-Path $env:CI_PREFIX 'Library\bin'
          Push-Location $libDir
          try {
            foreach ($dllName in @('hdf5', 'hdf5_hl')) {
              $dllPath = Join-Path $binDir "$dllName.dll"
              if (-not (Test-Path $dllPath)) {
                throw "Expected HDF5 runtime DLL not found: $dllPath"
              }

              $importLib = Join-Path $libDir "lib$dllName.dll.a"
              if (Test-Path $importLib) {
                Write-Host "Import library already exists: $importLib"
                continue
              }

              gendef $dllPath
              dlltool.exe -d "$dllName.def" -D "$dllName.dll" -l "lib$dllName.dll.a"
            }
          }
          finally {
            Pop-Location
          }

      - name: Reconfigure on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:XMDS_USER_DATA = Join-Path $PWD '.xmds-ci-home'
          $includePath = Join-Path $env:CI_PREFIX 'Library\include'
          $libPath = Join-Path $env:CI_PREFIX 'Library\lib'
          & $env:CI_PYTHON bin\xmds2 --reconfigure --include-path $includePath --lib-path $libPath
          if ($LASTEXITCODE -ne 0) {
            throw "Windows reconfigure failed with exit code $LASTEXITCODE"
          }

      - name: Compile lorenz on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:XMDS_USER_DATA = Join-Path $PWD '.xmds-ci-home'
          & $env:CI_PYTHON bin\xmds2 examples\lorenz.xmds
          if ($LASTEXITCODE -ne 0) {
            $entries = @(Get-ChildItem -LiteralPath . -Force | Select-Object -ExpandProperty Name)
            throw "Windows compile smoke failed with exit code $LASTEXITCODE. Workspace entries: $($entries -join ', ')"
          }

      - name: Run lorenz on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\lorenz.cmd
          if ($LASTEXITCODE -ne 0) {
            throw "Windows lorenz runtime smoke failed with exit code $LASTEXITCODE"
          }

      - name: Geometry regression on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          export XMDS_USER_DATA="$PWD/.xmds-test-home"
          PREFIX="$(python -c 'import sys; print(sys.prefix)' | tail -n 1)"
          python bin/xmds2 --reconfigure \
            --include-path "$PREFIX/include" \
            --lib-path "$PREFIX/lib"
          python run_tests.py geometry
