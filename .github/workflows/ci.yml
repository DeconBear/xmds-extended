name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.os }} smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: xmds-ci
          auto-activate: false
          channels: conda-forge
          conda-remove-defaults: true
          python-version: "3.11"
          use-mamba: true

      - name: Install CI dependencies on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          mamba install -y -n xmds-ci \
            cheetah3 \
            "pyparsing!=2.0.0" \
            mpmath \
            numpy \
            lxml \
            h5py \
            hdf5 \
            fftw \
            setuptools
          conda run -n xmds-ci python -V
          c++ --version
          conda run -n xmds-ci which h5cc || true

      - name: Install CI dependencies on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          conda install -y -n xmds-ci -c conda-forge `
            cheetah3 `
            'pyparsing!=2.0.0' `
            mpmath `
            numpy `
            lxml `
            h5py `
            hdf5 `
            fftw `
            setuptools `
            m2w64-toolchain

      - name: Smoke test on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          export XMDS_USER_DATA="$PWD/.xmds-ci-home"
          PREFIX="$(conda run -n xmds-ci python -c 'import sys; print(sys.prefix)' | tail -n 1)"
          conda run -n xmds-ci python bin/xmds2 --reconfigure \
            --include-path "$PREFIX/include" \
            --lib-path "$PREFIX/lib"
          conda run -n xmds-ci python bin/xmds2 examples/lorenz.xmds
          if [ "${RUNNER_OS}" = "macOS" ]; then
            DYLD_LIBRARY_PATH="$PREFIX/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}" ./lorenz
          else
            LD_LIBRARY_PATH="$PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" ./lorenz
          fi

      - name: Smoke test on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:XMDS_USER_DATA = Join-Path $PWD '.xmds-ci-home'
          $prefix = (conda run -n xmds-ci python -c "import sys; print(sys.prefix)").Trim()
          $includePath = Join-Path $prefix 'Library\include'
          $libPath = Join-Path $prefix 'Library\lib'
          $extraPaths = @(
            (Join-Path $prefix 'Library\mingw-w64\bin'),
            (Join-Path $prefix 'Library\usr\bin'),
            (Join-Path $prefix 'Library\bin'),
            (Join-Path $prefix 'Scripts'),
            (Join-Path $prefix 'bin')
          ) | Where-Object { Test-Path $_ }
          if (-not $extraPaths) {
            throw "No expected compiler/runtime paths were found under $prefix"
          }
          $env:PATH = (($extraPaths -join ';') + ';' + $env:PATH)
          g++ --version
          conda run -n xmds-ci python bin\xmds2 --reconfigure --include-path $includePath --lib-path $libPath
          conda run -n xmds-ci python bin\xmds2 examples\lorenz.xmds
          .\lorenz.cmd

      - name: Geometry regression on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          export XMDS_USER_DATA="$PWD/.xmds-test-home"
          PREFIX="$(conda run -n xmds-ci python -c 'import sys; print(sys.prefix)' | tail -n 1)"
          conda run -n xmds-ci python bin/xmds2 --reconfigure \
            --include-path "$PREFIX/include" \
            --lib-path "$PREFIX/lib"
          conda run -n xmds-ci python run_tests.py geometry
