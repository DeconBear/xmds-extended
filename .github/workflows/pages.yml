name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure GitHub Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payload = {
              owner,
              repo,
              build_type: 'workflow',
              source: {
                branch: 'main',
                path: '/'
              }
            };

            try {
              await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo });
              await github.request('PUT /repos/{owner}/{repo}/pages', payload);
              core.info('Updated existing GitHub Pages configuration.');
            } catch (error) {
              if (error.status === 404) {
                await github.request('POST /repos/{owner}/{repo}/pages', payload);
                core.info('Created GitHub Pages configuration.');
              } else if (error.status === 409) {
                core.info('GitHub Pages is already being configured; continuing.');
              } else {
                throw error;
              }
            }

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
