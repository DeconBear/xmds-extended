name: Windows Portable Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-portable:
    name: Build Windows portable package
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set package metadata
        id: meta
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}"
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $packageVersion = "${{ github.ref_name }}"
          }
          else {
            $packageVersion = "main-$($sha.Substring(0, 7))"
          }

          $packageZip = "xmds-extended-windows-portable-$packageVersion.zip"

          "package_version=$packageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_zip=$packageZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up MSYS2 MinGW toolchain payload
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-tools

      - name: Build portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & .\packaging\windows-portable\export_windows_portable_zip.ps1 `
            -PackageVersion '${{ steps.meta.outputs.package_version }}' `
            -ToolchainSource 'C:\msys64\mingw64'

      - name: Validate extracted package layout
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $packageRoot = Join-Path $PWD 'dist'
          $zipPath = Join-Path $packageRoot '${{ steps.meta.outputs.package_zip }}'
          $extractRoot = 'C:\xmds-package-smoke'

          if (Test-Path -LiteralPath $extractRoot) {
            Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }

          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractRoot -Force

          $packageDir = Join-Path $extractRoot "xmds-extended-windows-portable-${{ steps.meta.outputs.package_version }}"

          foreach ($expected in @(
            'install_windows.ps1',
            'README.txt',
            'payload\app\bin\xmds2',
            'payload\app\xpdeint\parser2.py',
            'payload\manifests\install-manifest.json',
            'payload\toolchain\mingw64\bin\g++.exe'
          )) {
            $expectedPath = Join-Path $packageDir $expected
            if (-not (Test-Path -LiteralPath $expectedPath)) {
              throw "Portable package is missing expected output: $expectedPath"
            }
          }

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ steps.meta.outputs.package_version }}
          path: dist/${{ steps.meta.outputs.package_zip }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.meta.outputs.package_zip }}
          generate_release_notes: true
          fail_on_unmatched_files: true
