name: Windows Portable Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-portable:
    name: Build Windows portable package
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set package metadata
        id: meta
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}"
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $packageVersion = "${{ github.ref_name }}"
          }
          else {
            $packageVersion = "main-$($sha.Substring(0, 7))"
          }

          $packageZip = "xmds-extended-windows-portable-$packageVersion.zip"

          "package_version=$packageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_zip=$packageZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up MSYS2 MinGW toolchain payload
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-tools

      - name: Build portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & .\packaging\windows-portable\export_windows_portable_zip.ps1 `
            -PackageVersion '${{ steps.meta.outputs.package_version }}' `
            -ToolchainSource 'C:\msys64\mingw64'

      - name: Validate packaged archive layout
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $packageRoot = Join-Path $PWD 'dist'
          $zipPath = Join-Path $packageRoot '${{ steps.meta.outputs.package_zip }}'
          $packageDir = "xmds-extended-windows-portable-${{ steps.meta.outputs.package_version }}"

          Add-Type -AssemblyName System.IO.Compression
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $archive = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
            $entryNames = @(
              $archive.Entries |
                ForEach-Object { $_.FullName.TrimEnd('\', '/').Replace('\', '/') } |
                Where-Object { $_ }
            )
          }
          finally {
            $archive.Dispose()
          }

          foreach ($expected in @(
            "$packageDir/install_windows.ps1",
            "$packageDir/README.txt",
            "$packageDir/payload/app/bin/xmds2",
            "$packageDir/payload/app/xpdeint/parser2.py",
            "$packageDir/payload/manifests/install-manifest.json",
            "$packageDir/payload/toolchain/mingw64/bin/g++.exe"
          )) {
            if ($expected -notin $entryNames) {
              throw "Portable package archive is missing expected entry: $expected"
            }
          }

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ steps.meta.outputs.package_version }}
          path: dist/${{ steps.meta.outputs.package_zip }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.meta.outputs.package_zip }}
          generate_release_notes: true
          fail_on_unmatched_files: true
