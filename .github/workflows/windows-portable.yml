name: Windows Portable Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-portable:
    name: Build Windows portable package
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set package metadata
        id: meta
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}"
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $packageVersion = "${{ github.ref_name }}"
          }
          else {
            $packageVersion = "main-$($sha.Substring(0, 7))"
          }

          $packageZip = "xmds-extended-windows-portable-$packageVersion.zip"

          "package_version=$packageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_zip=$packageZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up MSYS2 MinGW toolchain payload
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-tools

      - name: Build portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & .\packaging\windows-portable\export_windows_portable_zip.ps1 `
            -PackageVersion '${{ steps.meta.outputs.package_version }}' `
            -ToolchainSource 'C:\msys64\mingw64'

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ steps.meta.outputs.package_version }}
          path: dist/${{ steps.meta.outputs.package_zip }}
          if-no-files-found: error
          retention-days: 30

      - name: Resolve release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        shell: pwsh
        run: |
          $versionNotes = Join-Path $PWD "release-notes\${{ github.ref_name }}.md"
          $defaultNotes = Join-Path $PWD 'release-notes\default.md'

          if (Test-Path -LiteralPath $versionNotes) {
            $notesPath = $versionNotes
          }
          elseif (Test-Path -LiteralPath $defaultNotes) {
            $notesPath = $defaultNotes
          }
          else {
            throw 'No release notes file was found.'
          }

          "notes_path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.meta.outputs.package_zip }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          fail_on_unmatched_files: true
